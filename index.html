<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>裂隙远征 · Tactics</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="banner"><span class="b"></span></div>
    <div id="overlay"><h1 id="ovT"></h1><p id="ovP"></p><button class="btn" id="ovBtn">再来一战</button></div>
  </div>
  <div id="side">
    <div class="card">
      <div class="title">战况 · <span id="phaseChip" style="color:var(--blue)">我方回合</span> <span style="margin-left:auto;color:var(--sub);font-weight:normal">第 <b id="turnNo">1</b> 回合</span></div>
      <div id="hint">点击我方单位选中，蓝格移动，红格攻击。</div>
    </div>
    <div class="card" id="unitCard">
      <div class="title">单位详情</div>
      <div id="unitBody"><div class="empty">未选中单位</div></div>
    </div>
    <div class="card">
      <div class="row">
        <button class="btn sec" id="waitBtn">原地待命</button>
        <button class="btn" id="endBtn">结束回合 ▸</button>
      </div>
    </div>
    <div class="card">
      <div class="title">战报</div>
      <div id="log"></div>
    </div>
    <div class="card">
      <div class="legend">
        <span><i style="background:#5b8dd9"></i>移动</span>
        <span><i style="background:#d75c5c"></i>攻击</span>
        <span><i style="background:#5fbf7a"></i>治疗</span>
        <span><i style="background:#3f8b45"></i>森林+防</span>
        <span><i style="background:#3f74c4"></i>水·不可入</span>
      </div>
    </div>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
